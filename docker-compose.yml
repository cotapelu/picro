version: '3.8'

services:
  coding-agent:
    build: .
    container_name: pi-micro
    stdin_open: true
    tty: true
    volumes:
      - ./projects:/app/projects
      - ./memory:/app/.coding-agent
      - ~/.config/coding-agent:/home/coding-agent/.config/coding-agent
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    working_dir: /app/projects
    command: interactive
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 3s
      retries: 3
